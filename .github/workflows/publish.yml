name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (patch, minor, major)"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest # TODO: switch to blacksmith-4vcpu-ubuntu-2204 once registered
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc -b
      - name: Test
        run: npx vitest run
      - name: Version bump
        run: |
          cd packages/core && npm version ${{ inputs.version }} --no-git-tag-version
          cd ../verify && npm version ${{ inputs.version }} --no-git-tag-version
      - name: Build usertrust
        run: cd packages/core && npx tsc
      - name: Build verify
        run: cd packages/verify && npx tsc
      - name: Publish usertrust
        run: cd packages/core && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish verify
        run: cd packages/verify && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "release: v$(node -p 'require("./packages/core/package.json").version')"
          git push
