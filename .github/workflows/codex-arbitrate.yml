name: Codex Deliberation

on:
  issue_comment:
    types: [created]

# Only one deliberation per PR at a time
concurrency:
  group: codex-deliberate-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  deliberate:
    # Only trigger on PR comments with the deliberation marker, from trusted users
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '<!-- codex-deliberate') &&
      (github.event.comment.user.login == 'c-1k' ||
       github.event.comment.user.login == 'github-actions[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      response: ${{ steps.codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge
          fetch-depth: 0

      - name: Resolve PR base ref
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });
            core.setOutput('base-ref', data.base.ref);

      - name: Fetch refs
        run: |
          git fetch --no-tags origin ${{ steps.pr.outputs.base-ref }} \
            +refs/pull/${{ github.event.issue.number }}/head

      - name: Extract deliberation context
        id: context
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.comment.body ?? '';
            const match = body.match(/<!--\s*codex-deliberate\b([\s\S]*?)-->/i);
            if (!match) {
              core.setFailed('No deliberation context found');
              return;
            }
            const ctx = match[1] ?? '';
            const finding = ctx.match(/FINDING:\s*([\s\S]*?)(?=\s*CLAUDE_POSITION:)/)?.[1]?.trim() || '';
            const claudePos = ctx.match(/CLAUDE_POSITION:\s*([\s\S]*?)$/)?.[1]?.trim() || '';
            core.setOutput('finding', finding);
            core.setOutput('claude-position', claudePos);

      - name: Build prompt from extracted context
        id: prompt
        run: |
          delimiter="$(openssl rand -hex 16)"
          {
            echo "text<<${delimiter}"
            cat <<'PROMPT_END'
          You are participating in an adversarial deliberation protocol.

          In a previous code review, you (Codex) flagged this finding:

          PROMPT_END
            echo "${FINDING}"
            cat <<'PROMPT_END'

          The code author (Claude) disagrees and argues:

          PROMPT_END
            echo "${CLAUDE_POSITION}"
            cat <<'PROMPT_END'

          YOUR TASK: Defend your original finding. Claude dismissed it — explain why Claude is WRONG. Make the strongest possible case that your original finding is valid and should be fixed.

          You must:
          1. Identify specific flaws in Claude's counter-argument
          2. Cite concrete code evidence (file paths, line numbers, patterns) supporting your finding
          3. Explain the real-world impact if your finding is ignored
          4. Rate your confidence (1-10) that the finding is valid AFTER considering Claude's argument

          If — and ONLY if — Claude's argument reveals that your original finding was based on a factual misunderstanding of the code (not a difference of opinion), you may concede. But you must:
          - Quote the exact code evidence that proves your finding wrong
          - Explain specifically what you misread or misunderstood
          - A difference in risk tolerance is NOT grounds for concession

          Structure your response as:
          ## Codex Defends Finding

          **Original finding:** [one-line summary]
          **Claude's dismissal:** [one-line summary]

          **Why Claude is wrong:**
          [Your defense of the finding with code evidence]

          **Confidence after review:** [1-10]

          **Verdict:**
          - If confidence >= 7: "I maintain my finding. [specific fix needed]"
          - If confidence 4-6: "Stalemate — escalate to human reviewer"
          - If confidence <= 3: "I concede — [quote the specific code evidence that proves me wrong]"
          PROMPT_END
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"
        env:
          FINDING: ${{ steps.context.outputs.finding }}
          CLAUDE_POSITION: ${{ steps.context.outputs.claude-position }}

      - name: Run Codex Deliberation
        id: codex
        uses: openai/codex-action@c25d10f3f498316d4b2496cc4c6dd58057a7b031
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.3-codex
          prompt: ${{ steps.prompt.outputs.text }}
          output-file: deliberation-output.md
          sandbox: read-only

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deliberation-${{ github.event.issue.number }}
          path: deliberation-output.md
          retention-days: 30

  post-deliberation:
    runs-on: ubuntu-latest
    needs: deliberate
    if: needs.deliberate.outputs.response != ''
    permissions:
      pull-requests: write
    steps:
      - name: Post deliberation response
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const body = `## Codex Deliberation (gpt-5.3-codex)\n\n${process.env.RESPONSE}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
        env:
          RESPONSE: ${{ needs.deliberate.outputs.response }}

  post-failure:
    runs-on: ubuntu-latest
    needs: deliberate
    if: ${{ always() && needs.deliberate.result == 'failure' }}
    permissions:
      pull-requests: write
    steps:
      - name: Post failure notice
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const body = `## Codex Deliberation Failed\n\nThe Codex deliberation action did not produce a response. This may be due to a timeout, rate limit, or API error.\n\n**[View workflow run](${runUrl})** for details.\n\nTo retry, post another comment with the \`<!-- codex-deliberate -->\` marker.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
