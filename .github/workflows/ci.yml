name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest # TODO: switch to blacksmith-4vcpu-ubuntu-2204 once registered
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx biome check .

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest # TODO: switch to blacksmith-4vcpu-ubuntu-2204 once registered
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc -b --noEmit

  test:
    name: test
    runs-on: ubuntu-latest # TODO: switch to blacksmith-4vcpu-ubuntu-2204 once registered
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run tests with coverage
        run: npx vitest run --coverage
      - name: Check coverage thresholds
        run: >-
          npx vitest run --coverage
          --coverage.thresholds.lines=92
          --coverage.thresholds.branches=85
          --coverage.thresholds.functions=90
          --coverage.thresholds.statements=92
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
