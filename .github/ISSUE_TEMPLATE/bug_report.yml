name: Bug Report
description: Report a bug in usertrust
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Tell us what you see
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      render: typescript
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: usertrust version
      description: Output of `npm ls usertrust`
      placeholder: "0.2.6"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "v22.x.x"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Running mode
      options:
        - dryRun: true
        - Full mode (with TigerBeetle)
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: LLM provider
      options:
        - Anthropic
        - OpenAI
        - Google
        - Other
    validations:
      required: true
